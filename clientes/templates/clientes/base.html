<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.navbar_brand }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'clientes:portal' %}">
            <i class="bi bi-headset"></i> {{ t.navbar_brand }}
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="{% url 'clientes:nueva_incidencia' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-plus-circle"></i> {{ t.navbar_new }}
            </a>
            <a href="{% url 'clientes:mis_incidencias' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-search"></i> {{ t.navbar_mine }}
            </a>
            <!-- Selector de idioma -->
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-globe"></i> {{ lang|upper }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item {% if lang == 'es' %}active{% endif %}"
                           href="javascript:void(0)" onclick="switchLang('es')">
                            ES &mdash; Español
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item {% if lang == 'en' %}active{% endif %}"
                           href="javascript:void(0)" onclick="switchLang('en')">
                            EN &mdash; English
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function switchLang(lang) {
    var url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    window.location.href = url.toString();
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
