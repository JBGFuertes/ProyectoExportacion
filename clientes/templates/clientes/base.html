<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'clientes:portal' %}">
            <i class="bi bi-headset"></i> Portal de Clientes
        </a>
        <div class="ms-auto d-flex gap-2">
            <a href="{% url 'clientes:nueva_incidencia' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-plus-circle"></i> Nueva incidencia
            </a>
            <a href="{% url 'clientes:mis_incidencias' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-search"></i> Mis incidencias
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
