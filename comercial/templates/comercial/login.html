{% extends 'comercial/base.html' %}
{% load static %}

{% block title %}Acceso{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-card__logo">
            <div class="login-card__logo-box">
                <img src="{% static 'comercial/img/logo-blanco.png' %}" alt="Grupo Fuertes">
            </div>
        </div>
        <p class="login-card__title">Portal Comercial</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2 mb-3">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label fw-500 text-muted small text-uppercase">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-500 text-muted small text-uppercase">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-corporativo w-100 justify-content-center">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
